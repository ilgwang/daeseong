<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>관리자 로그인 — 대성교회</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a3a5c 0%, #2d5f8d 50%, #4a2870 100%);
        font-family: "Noto Sans KR", "Pretendard", sans-serif;
    }

    .login-card {
        background: #fff;
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .login-logo {
        text-align: center;
        margin-bottom: 32px;
    }

    .login-logo .cross {
        font-size: 40px;
        display: block;
        margin-bottom: 8px;
    }

    .login-logo h1 {
        font-size: 22px;
        font-weight: 700;
        color: #2d5f8d;
        letter-spacing: -0.02em;
    }

    .login-logo p {
        font-size: 13px;
        color: #999;
        margin-top: 4px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 6px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        font-family: inherit;
        transition: border-color 0.2s;
        outline: none;
    }

    .form-group input:focus {
        border-color: #2d5f8d;
        box-shadow: 0 0 0 3px rgba(45,95,141,0.1);
    }

    .error-msg {
        background: #fff0f0;
        border: 1px solid #ffcccc;
        color: #c0392b;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 18px;
        text-align: center;
    }

    .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2d5f8d, #7b35b5);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #999;
        text-decoration: none;
        transition: color 0.2s;
    }

    .back-link:hover { color: #2d5f8d; }
</style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <span class="cross">✝</span>
        <h1>대성교회</h1>
        <p>관리자 로그인</p>
    </div>

    <div class="error-msg" th:if="${param.error}">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form method="post" th:action="@{/login}">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" autofocus>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn-login">로그인</button>
    </form>

    <a href="/" class="back-link">← 교회 홈페이지로 돌아가기</a>
</div>
</body>
</html>
