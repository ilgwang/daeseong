<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>커뮤니티 — 대성교회</title>
<script src="https://code.jquery.com/jquery-latest.js"></script>
<link rel="stylesheet" th:href="@{/css/normalize.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/reset.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/main.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/responsible.css}">
<link rel="stylesheet" th:href="@{/css/modern-design.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">
<link rel="stylesheet" th:href="@{/css/sermons-gallery.css}">
<link rel="stylesheet" th:href="@{/css/news.css}">
</head>
<body>
<div id="wrap">
    <div id="vis_sec" class="vis_sec_bg" style="padding: 0px;">
        <header id="header">
            <link rel="stylesheet" th:href="@{/css/superfish.css}">
            <link rel="stylesheet" th:href="@{/css/style.css}">
            <link rel="stylesheet" th:href="@{/css/slicknav.css}">
            <script th:src="@{/css/jquery.slicknav.js}"></script>
            <script type="text/javascript">
                $(document).ready(function(){ $('#menu').slicknav(); });
            </script>
            <div class="header_top_item">
                <ul class="top_section" style="right:-5px;top:20px">
                    <li><a th:href="@{/admin}">관리자</a></li>
                </ul>
                <h1><a th:href="@{/}"><img th:src="@{/image/index_logo_daeseong.png}" alt="대성교회" /></a></h1>
                <div id="m_nav"></div>
                <div class="header_gnb">
                    <div class="main_nav">
                        <nav class="nav">
                            <ul class="sf-menu" id="menu">
                                <li><a th:href="@{/about}">교회소개</a></li>
                                <li><a th:href="@{/sermons}">설교영상</a></li>
                                <li><a th:href="@{/news}">커뮤니티</a></li>
                                <li><a th:href="@{/location}">오시는길</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </header>
    </div>

    <div class="news-page-title"></div>

    <div class="news-container">
        <div class="news-filters">
            <button class="news-filter-btn" th:classappend="${currentType == 'gospel'}   ? ' active'" data-type="gospel">복음통일</button>
            <button class="news-filter-btn" th:classappend="${currentType == 'news'}     ? ' active'" data-type="news">교회소식</button>
            <button class="news-filter-btn" th:classappend="${currentType == 'bulletin'} ? ' active'" data-type="bulletin">주보</button>
            <button class="news-filter-btn" th:classappend="${currentType == 'poetry'}   ? ' active'" data-type="poetry">시집</button>
            <button class="news-filter-btn" th:classappend="${currentType == 'column'}   ? ' active'" data-type="column">칼럼</button>
            <button class="news-filter-btn" th:classappend="${currentType == 'study'}    ? ' active'" data-type="study">Bible Study</button>
        </div>

        <div class="news-list" id="news-list">
            <!-- 빈 상태 -->
            <div th:if="${#lists.isEmpty(newsList)}"
                 style="text-align:center;padding:60px;color:#aaa;">
                등록된 게시글이 없습니다.
            </div>
            <!-- 아코디언 아이템 반복 -->
            <div class="accordion-item"
                 th:each="news : ${newsList}"
                 th:data-type="${news.type}"
                 th:data-id="${news.id}">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <div class="accordion-left">
                        <div class="accordion-icon"
                             th:text="${news.type == 'gospel'  ? '✝️' :
                                       news.type == 'news'    ? '📰' :
                                       news.type == 'bulletin'? '📄' :
                                       news.type == 'poetry'  ? '✨' :
                                       news.type == 'column'  ? '✍️' : '📖'}">✝️</div>
                        <div class="accordion-title" th:text="${news.title}"></div>
                    </div>
                    <div class="accordion-toggle">+</div>
                </div>
                <div class="accordion-content">
                    <div class="content-title" th:text="${news.title}"></div>
                    <div class="news-images"></div>
                    <div class="news-desc" th:utext="${news.content}"></div>
                </div>
            </div>
        </div>

        <div class="news-pagination" id="news-pagination"
             th:data-current="${currentPage}"
             th:data-total="${totalPages}"
             th:data-type="${currentType}">
        </div>
    </div>

    <footer>
        <div class="inner_footer">
            <p><img th:src="@{/image/footer_logo2.png}" alt="" /></p>
            <address>
                <p><a href="#">온라인 헌금계좌 안내 &nbsp;&nbsp;&nbsp;&nbsp;예금주: &nbsp;대한예수교장로회 대성교회, &nbsp;&nbsp;국민은행, 867901-00-030346</a></p>
                <p>우편번호 (17006) 경기도 용인시 기흥구 동백중앙로 175  우함빌딩 901호</p>
                <p>E-Mail : daeseong2013@naver.com</p>
                <p th:text="'Copyright ⓒ ' + ${#temporals.year(#temporals.createNow())} + ' 대성교회 all right reserved'"></p>
            </address>
        </div>
    </footer>
</div>

<script>
    // 필터 이벤트 위임
    document.querySelector('.news-filters').addEventListener('click', function(e) {
        const btn = e.target.closest('.news-filter-btn');
        if (!btn) return;
        loadNews(btn.dataset.type, 1);
    });

    // 아코디언 토글 + 이미지 지연 로딩
    function toggleAccordion(header) {
        const item   = header.parentElement;
        const isOpen = item.classList.contains('active');
        document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.accordion-toggle').forEach(t => t.textContent = '+');
        if (!isOpen) {
            item.classList.add('active');
            header.querySelector('.accordion-toggle').textContent = '−';
            const imgArea = item.querySelector('.news-images');
            if (imgArea && !imgArea.dataset.loaded) {
                const id = item.dataset.id;
                if (id) {
                    fetch(`/api/news/${id}`)
                        .then(r => r.json())
                        .then(data => {
                            imgArea.innerHTML = buildImages(data.images);
                            imgArea.dataset.loaded = 'true';
                        });
                }
            }
        }
    }

    function fileType(path) {
        if (/\.(mp4|webm|ogg|mov|avi|mkv)$/i.test(path)) return 'video';
        if (/\.pdf$/i.test(path)) return 'pdf';
        return 'image';
    }

    function buildFileItem(path, active) {
        const cls = 'slider-item' + (active ? ' active' : '');
        const t = fileType(path);
        if (t === 'video') return `<div class="${cls}"><video class="slider-video" controls><source src="${path}"></video></div>`;
        if (t === 'pdf')   return `<div class="${cls}" style="display:flex;align-items:center;justify-content:center;height:100%"><a href="${path}" target="_blank" class="pdf-link">📄 PDF 파일 보기</a></div>`;
        return `<div class="${cls}"><img src="${path}" alt=""></div>`;
    }

    function buildImages(images) {
        if (!images || images.length === 0) return '';

        if (images.length === 1) {
            const path = images[0].imagePath;
            const t = fileType(path);
            if (t === 'video') return `<div class="news-image-area"><video class="news-video" controls><source src="${path}"></video></div>`;
            if (t === 'pdf')   return `<div class="news-image-area"><a href="${path}" target="_blank" class="pdf-link">📄 PDF 파일 보기</a></div>`;
            return `<div class="news-image-area"><img src="${path}" alt=""></div>`;
        }

        const items = images.map((img, i) => buildFileItem(img.imagePath, i === 0)).join('');
        const dots  = images.map((_, i) => `<span class="dot${i===0?' active':''}"></span>`).join('');
        return `<div class="image-slider-container">
            <div class="image-slider">${items}</div>
            <button class="slider-prev" onclick="slideMove(this,-1)">&#8249;</button>
            <button class="slider-next" onclick="slideMove(this,1)">&#8250;</button>
            <div class="slider-dots">${dots}</div>
        </div>`;
    }

    function slideMove(btn, dir) {
        const container = btn.closest('.image-slider-container');
        const items = container.querySelectorAll('.slider-item');
        const dots  = container.querySelectorAll('.dot');
        let cur = [...items].findIndex(i => i.classList.contains('active'));
        const prevVideo = items[cur].querySelector('video');
        if (prevVideo) prevVideo.pause();
        items[cur].classList.remove('active');
        dots[cur].classList.remove('active');
        cur = (cur + dir + items.length) % items.length;
        items[cur].classList.add('active');
        dots[cur].classList.add('active');
    }

    function loadNews(type, page) {
        fetch(`/api/news?type=${type}&page=${page}`)
            .then(r => r.json())
            .then(data => {
                renderNewsList(data.news);
                renderNewsPagination(type, data.currentPage, data.totalPages);
                const typeOrder = ['gospel', 'news', 'bulletin', 'poetry', 'column', 'study'];
                document.querySelectorAll('.news-filter-btn').forEach((btn, idx) => {
                    btn.classList.toggle('active', typeOrder[idx] === type);
                });
            });
    }

    function renderNewsList(newsList) {
        const container = document.getElementById('news-list');
        if (!newsList || newsList.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px;color:#aaa;">등록된 게시글이 없습니다.</div>';
            return;
        }
        const iconMap = { gospel:'✝️', news:'📰', bulletin:'📄', poetry:'✨', column:'✍️', study:'📖' };
        container.innerHTML = newsList.map(n => `
            <div class="accordion-item" data-type="${n.type}" data-id="${n.id}">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <div class="accordion-left">
                        <div class="accordion-icon">${iconMap[n.type] || '📌'}</div>
                        <div class="accordion-title">${n.title}</div>
                    </div>
                    <div class="accordion-toggle">+</div>
                </div>
                <div class="accordion-content">
                    <div class="content-title">${n.title}</div>
                    <div class="news-images"></div>
                    <div class="news-desc">${n.content || ''}</div>
                </div>
            </div>`).join('');
    }

    document.getElementById('news-pagination').addEventListener('click', function(e) {
        const btn = e.target.closest('.pagination-btn');
        if (!btn || btn.classList.contains('disabled')) return;
        loadNews(btn.dataset.type, parseInt(btn.dataset.page));
    });

    function renderNewsPagination(type, currentPage, totalPages) {
        const container = document.getElementById('news-pagination');
        container.dataset.current = currentPage;
        container.dataset.total   = totalPages;
        container.dataset.type    = type;
        if (!totalPages || totalPages <= 1) { container.innerHTML = ''; return; }

        const WINDOW = 10;
        let start = Math.max(1, currentPage - Math.floor(WINDOW / 2));
        let end   = Math.min(totalPages, start + WINDOW - 1);
        if (end - start < WINDOW - 1) start = Math.max(1, end - WINDOW + 1);

        let html = `<button class="pagination-btn${currentPage <= 1 ? ' disabled' : ''}" onclick="loadNews('${type}',${currentPage-1})">&lt;</button>`;
        for (let i = start; i <= end; i++) {
            html += `<button class="pagination-btn${i===currentPage?' active':''}" onclick="loadNews('${type}',${i})">${i}</button>`;
        }
        html += `<button class="pagination-btn${currentPage >= totalPages ? ' disabled' : ''}" onclick="loadNews('${type}',${currentPage+1})">&gt;</button>`;
        container.innerHTML = html;
    }

    (function() {
        const pg = document.getElementById('news-pagination');
        renderNewsPagination(pg.dataset.type, parseInt(pg.dataset.current)||1, parseInt(pg.dataset.total)||1);
    })();
</script>
</body>
</html>
