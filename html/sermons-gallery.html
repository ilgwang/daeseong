<script>
	// Filter functionality
	document.querySelectorAll('.sermon-filter-btn').forEach(btn => {
		btn.addEventListener('click', function() {
			const filter = this.dataset.filter;
			document.querySelectorAll('.sermon-filter-btn').forEach(b => b.classList.remove('active'));
			this.classList.add('active');

			const cards = document.querySelectorAll('.sermon-card');
			cards.forEach(card => {
				if (filter === 'all' || card.dataset.type === filter) {
					card.style.display = 'block';
				} else {
					card.style.display = 'none';
				}
			});
		});
	});

	// Video player in thumbnail functionality
	const videoCards = document.querySelectorAll('.sermon-card-video');

	videoCards.forEach(card => {
		const playBtn = card.querySelector('.sermon-thumb-icon');
		const iframe = card.querySelector('.sermon-thumb-video');

		playBtn.addEventListener('click', function(e) {
			e.preventDefault();
			e.stopPropagation();

			const videoId = card.dataset.videoId;
			const startTime = card.dataset.start || '0';
			const iframeSrc = `https://www.youtube.com/embed/${videoId}?start=${startTime}&autoplay=1`;

			iframe.src = iframeSrc;
			iframe.style.display = 'block';
			playBtn.style.display = 'none';
		});
	});
</script>
