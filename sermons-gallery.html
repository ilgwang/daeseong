<script>
	// Sermon Register Modal
	const sermonModal = document.getElementById('sermon-register-modal');
	const sermonRegisterBtn = document.getElementById('sermon-register-open');
	const sermonCloseBtn = document.querySelector('.sermon-modal-close');
	const sermonCancelBtn = document.querySelector('.btn-cancel');
	const sermonForm = document.getElementById('sermon-register-form');

	if (sermonRegisterBtn) {
		sermonRegisterBtn.addEventListener('click', function(e) {
			e.preventDefault();
			sermonModal.classList.add('active');
		});
	}

	if (sermonCloseBtn) {
		sermonCloseBtn.addEventListener('click', function() {
			sermonModal.classList.remove('active');
		});
	}

	if (sermonCancelBtn) {
		sermonCancelBtn.addEventListener('click', function(e) {
			e.preventDefault();
			sermonModal.classList.remove('active');
			sermonForm.reset();
		});
	}

	sermonModal.addEventListener('click', function(e) {
		if (e.target === sermonModal) {
			sermonModal.classList.remove('active');
			sermonForm.reset();
		}
	});

	document.addEventListener('keydown', function(e) {
		if (e.key === 'Escape' && sermonModal.classList.contains('active')) {
			sermonModal.classList.remove('active');
			sermonForm.reset();
		}
	});

	sermonForm.addEventListener('submit', function(e) {
		e.preventDefault();
		const formData = {
			title: document.getElementById('sermon-title').value,
			pastor: document.getElementById('sermon-pastor').value,
			verse: document.getElementById('sermon-verse').value,
			type: document.getElementById('sermon-type').value,
			date: document.getElementById('sermon-date').value,
			url: document.getElementById('sermon-url').value
		};

		console.log('설교 등록 데이터:', formData);
		alert('설교영상이 등록되었습니다.');
		sermonModal.classList.remove('active');
		sermonForm.reset();
	});

	// SNS Login Modal
	const snsModal = document.getElementById('sns-login-modal');
	const loginBtn = document.querySelector('.login-btn');
	const closeBtn = document.querySelector('.sns-modal-close');

	loginBtn.addEventListener('click', function(e) {
		e.preventDefault();
		snsModal.classList.add('active');
	});

	closeBtn.addEventListener('click', function() {
		snsModal.classList.remove('active');
	});

	snsModal.addEventListener('click', function(e) {
		if (e.target === snsModal) {
			snsModal.classList.remove('active');
		}
	});

	document.addEventListener('keydown', function(e) {
		if (e.key === 'Escape' && snsModal.classList.contains('active')) {
			snsModal.classList.remove('active');
		}
	});

	// Filter functionality
	document.querySelectorAll('.sermon-filter-btn').forEach(btn => {
		btn.addEventListener('click', function() {
			const filter = this.dataset.filter;
			document.querySelectorAll('.sermon-filter-btn').forEach(b => b.classList.remove('active'));
			this.classList.add('active');

			const cards = document.querySelectorAll('.sermon-card');
			cards.forEach(card => {
				if (filter === 'all' || card.dataset.type === filter) {
					card.style.display = 'block';
				} else {
					card.style.display = 'none';
				}
			});
		});
	});

	// Video player in thumbnail functionality
	const videoCards = document.querySelectorAll('.sermon-card-video');

	videoCards.forEach(card => {
		const playBtn = card.querySelector('.sermon-thumb-icon');
		const iframe = card.querySelector('.sermon-thumb-video');

		playBtn.addEventListener('click', function(e) {
			e.preventDefault();
			e.stopPropagation();

			const videoId = card.dataset.videoId;
			const startTime = card.dataset.start || '0';
			const iframeSrc = `https://www.youtube.com/embed/${videoId}?start=${startTime}&autoplay=1`;

			iframe.src = iframeSrc;
			iframe.style.display = 'block';
			playBtn.style.display = 'none';
		});
	});
</script>
